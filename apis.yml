description: >-
  USAA (United Services Automobile Association) is a financial services group
  offering banking, investing, and insurance products exclusively to people and
  families that serve, or have served, in the United States military. As a
  Fortune 100 company, USAA provides auto insurance, homeowners insurance, life
  insurance, banking, investments, and retirement products. USAA is an active
  member of the Financial Data Exchange (FDX) and provides open banking
  connectivity through API aggregators including Plaid and Mastercard Open
  Banking (formerly Flinks).
