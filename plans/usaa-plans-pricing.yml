description: USAA is a member-only financial services provider (banking, insurance, investments) for the U.S. military community. There is no public developer portal or commercial API pricing. Member-side integrations are surfaced only via the USAA mobile/web experience and partner aggregator data-sharing agreements (e.g. via FDX-style consumer-permissioned data flows).
sources:
  - https://www.usaa.com/
notes: No public API pricing or developer portal located. Any data-sharing or integration access (account aggregation, mortgage, insurance) is provisioned through partner data-aggregator contracts under USAA's membership terms.
