description: USAA does not publish public API rate limits. Throttling and quotas are governed by partner data-sharing/aggregator agreements and are not surfaced in any public developer documentation.
sources:
  - https://www.usaa.com/
notes: No public rate-limit documentation. Limits are negotiated per partner integration; consumers must obtain operational specifics from the USAA partner-onboarding sponsor.
responseCodes:
  throttled: 429
limits:
  - name: Partner-Contracted Limit
    scope: account
    metric: varies
    limit: see partner agreement
policies:
  - name: Partner Agreement Governs
    description: Throughput, concurrency, and quota terms live in the signed data-sharing/partner agreement; there is no public rate-limit page.
