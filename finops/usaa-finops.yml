meters:
  - name: contracted_access
    description: API access provisioned under a partner data-sharing agreement; not metered as a developer billing line
    unit: varies
    aggregation: count
principles:
  - name: Visibility
    description: USAA does not expose a public usage API; partners must reconcile traffic through their own client-side telemetry and any reporting agreed in the data-sharing contract.
  - name: Allocation
    description: Costs are not allocated to USAA-issued line items; integration partners absorb their own costs and report internally.
  - name: Optimization
    description: Optimization is at the integration design level (consumer-permissioned data, refresh cadence, scope minimization) rather than per-call cost.
  - name: Accountability
    description: Owned by the integration partner's engineering and risk-management functions, with USAA holding contractual oversight via the data-sharing agreement.
